<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1280" viewBox="0 0 1800 1280" role="img" aria-labelledby="title desc">
  <title id="title">FinProof 권장 서브에이전트 조합과 AI 분석 Flow</title>
  <desc id="desc">업로드 자료와 승인 지식, 심의이력 검색 이후 기본 도메인 에이전트 4개와 조건부 품질 에이전트 3개가 실행되는 흐름</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font: 800 46px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #172033; }
      .subtitle { font: 500 20px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5a6478; }
      .section { font: 800 18px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; letter-spacing: .08em; fill: #44516a; }
      .label { font: 750 26px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #172033; }
      .small { font: 500 17px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4b5568; }
      .tiny { font: 650 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #526072; }
      .condition { font: 700 17px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #6d4c18; }
      .node { stroke-width: 2; rx: 18; }
      .rail { fill: none; stroke: #c7ceda; stroke-width: 3; }
      .arrow { stroke: #5d6a7d; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .softArrow { stroke: #8a95a6; stroke-width: 2.5; fill: none; marker-end: url(#softArrow); stroke-dasharray: 8 9; }
      .gateArrow { stroke: #a27322; stroke-width: 3; fill: none; marker-end: url(#gateArrow); }
      .io { fill: #eef4ff; stroke: #7ea2d6; }
      .retrieval { fill: #f1f8f3; stroke: #81b58c; }
      .domain { fill: #fff7e8; stroke: #d9a54f; }
      .quality { fill: #f4eefc; stroke: #a985d6; }
      .persist { fill: #edf6f7; stroke: #69aeb6; }
      .cost { fill: #fff; stroke: #c9d0db; }
      .chip { fill: #ffffff; stroke: #d5dae3; }
      .chipText { font: 700 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #455168; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5d6a7d"/>
    </marker>
    <marker id="softArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a95a6"/>
    </marker>
    <marker id="gateArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a27322"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1280"/>
  <text class="title" x="90" y="92">FinProof 권장 서브에이전트 조합과 AI 분석 Flow</text>
  <text class="subtitle" x="92" y="130">상시 호출은 도메인 판단에 집중하고, 검증·사례·충돌 조정은 조건부로 실행해 비용과 정확도를 균형화</text>

  <text class="section" x="92" y="194">INPUT &amp; RETRIEVAL</text>
  <rect class="node io" x="90" y="220" width="300" height="128" rx="18"/>
  <text class="label" x="122" y="264">심의자료 업로드</text>
  <text class="small" x="122" y="298">홍보물, 약관, 설명서, 금리표</text>
  <text class="tiny" x="122" y="324">Object Storage + DB metadata</text>

  <rect class="node io" x="460" y="220" width="300" height="128" rx="18"/>
  <text class="label" x="492" y="264">OCR/Text 추출</text>
  <text class="small" x="492" y="298">본문, 파일별 confidence</text>
  <text class="tiny" x="492" y="324">extractedDocuments</text>

  <rect class="node retrieval" x="830" y="220" width="340" height="128" rx="18"/>
  <text class="label" x="862" y="264">RAG 후보 검색</text>
  <text class="small" x="862" y="298">상품자료 + 승인 지식 + 심의이력</text>
  <text class="tiny" x="862" y="324">product_doc / law / internal_policy / case_history</text>

  <rect class="node retrieval" x="1240" y="220" width="280" height="128" rx="18"/>
  <text class="label" x="1272" y="264">Rerank</text>
  <text class="small" x="1272" y="298">상위 근거 후보 정렬</text>
  <text class="tiny" x="1272" y="324">evidenceCandidates</text>

  <path class="arrow" d="M390 284 H455"/>
  <path class="arrow" d="M760 284 H825"/>
  <path class="arrow" d="M1170 284 H1235"/>

  <text class="section" x="92" y="432">DEFAULT DOMAIN AGENTS · 기본 실행</text>
  <line class="rail" x1="170" y1="506" x2="1630" y2="506"/>

  <rect class="node domain" x="120" y="470" width="330" height="154" rx="18"/>
  <text class="label" x="152" y="514">홍보물 시안</text>
  <text class="tiny" x="152" y="546">creative_review</text>
  <text class="small" x="152" y="580">오인 표현, 과장·단정,</text>
  <text class="small" x="152" y="606">혜택 강조와 시각 불균형</text>

  <rect class="node domain" x="510" y="470" width="330" height="154" rx="18"/>
  <text class="label" x="542" y="514">상품·약관</text>
  <text class="tiny" x="542" y="546">product_terms</text>
  <text class="small" x="542" y="580">상품설명서, 약관, 금리표와</text>
  <text class="small" x="542" y="606">홍보 주장 정합성</text>

  <rect class="node domain" x="900" y="470" width="330" height="154" rx="18"/>
  <text class="label" x="932" y="514">금융광고 법규</text>
  <text class="tiny" x="932" y="546">regulation_agent</text>
  <text class="small" x="932" y="580">승인된 법규·감독규정 근거</text>
  <text class="small" x="932" y="606">없으면 법률 판단 유보</text>

  <rect class="node domain" x="1290" y="470" width="330" height="154" rx="18"/>
  <text class="label" x="1322" y="514">사내 심의기준</text>
  <text class="tiny" x="1322" y="546">internal_policy_agent</text>
  <text class="small" x="1322" y="580">내부 체크리스트, 금지 표현,</text>
  <text class="small" x="1322" y="606">보수적 기준 적용</text>

  <path class="softArrow" d="M1380 348 V424 C1380 452 1455 438 1455 466"/>
  <path class="softArrow" d="M1380 348 V424 C1380 452 1065 438 1065 466"/>
  <path class="softArrow" d="M1380 348 V424 C1380 452 675 438 675 466"/>
  <path class="softArrow" d="M1380 348 V424 C1380 452 285 438 285 466"/>

  <text class="section" x="92" y="730">CONDITIONAL QUALITY AGENTS · 조건부 실행</text>

  <rect class="node quality" x="150" y="766" width="420" height="168" rx="18"/>
  <text class="label" x="182" y="810">근거 검증</text>
  <text class="tiny" x="182" y="842">evidence_verification</text>
  <text class="condition" x="182" y="878">조건: high 이상 · 낮은 confidence · 약한 근거</text>
  <text class="small" x="182" y="910">도메인 Agent 후보가 실제 근거로</text>
  <text class="small" x="182" y="934">뒷받침되는지 재확인</text>

  <rect class="node quality" x="690" y="766" width="420" height="168" rx="18"/>
  <text class="label" x="722" y="810">유사 심의사례</text>
  <text class="tiny" x="722" y="842">case_search</text>
  <text class="condition" x="722" y="878">조건: case_history 후보 존재</text>
  <text class="small" x="722" y="910">현재 판단을 대체하지 않고</text>
  <text class="small" x="722" y="934">사례 ID 1-3개만 참고로 연결</text>

  <rect class="node quality" x="1230" y="766" width="420" height="168" rx="18"/>
  <text class="label" x="1262" y="810">충돌 조정</text>
  <text class="tiny" x="1262" y="842">conflict_resolution</text>
  <text class="condition" x="1262" y="878">조건: 위험도 2단계 이상 차이 · 반려 권고</text>
  <text class="small" x="1262" y="910">상충 판단을 보수적으로 정리하고</text>
  <text class="small" x="1262" y="934">Reviewer 확인 대상으로 표시</text>

  <path class="gateArrow" d="M520 624 C430 668 385 710 360 762"/>
  <path class="gateArrow" d="M1000 348 C940 514 906 650 900 762"/>
  <path class="gateArrow" d="M1065 624 C1180 678 1360 692 1440 762"/>

  <text class="section" x="92" y="1032">OUTPUT</text>
  <rect class="node persist" x="250" y="1060" width="360" height="128" rx="18"/>
  <text class="label" x="282" y="1104">Issue 후보 생성</text>
  <text class="tiny" x="282" y="1136">buildAnalysisIssues</text>
  <text class="small" x="282" y="1162">sourceAgents + evidence 연결</text>

  <rect class="node persist" x="720" y="1060" width="360" height="128" rx="18"/>
  <text class="label" x="752" y="1104">분석 결과 저장</text>
  <text class="tiny" x="752" y="1136">agent_runs / agent_findings / issues</text>
  <text class="small" x="752" y="1162">감사 가능 경로 보존</text>

  <rect class="node cost" x="1190" y="1060" width="360" height="128" rx="18"/>
  <text class="label" x="1222" y="1104">온디맨드 AI</text>
  <text class="tiny" x="1222" y="1136">rag_chat / opinion_draft / report_generation</text>
  <text class="small" x="1222" y="1162">채팅·초안·리포트는 분석 Agent와 분리</text>

  <path class="arrow" d="M900 934 V1015 C900 1035 430 1035 430 1056"/>
  <path class="arrow" d="M610 1124 H715"/>
  <path class="softArrow" d="M1080 1124 H1185"/>

  <rect class="chip" x="90" y="1198" width="270" height="44" rx="22"/>
  <text class="chipText" x="116" y="1226">상시 LLM: 4 domain calls</text>
  <rect class="chip" x="382" y="1198" width="350" height="44" rx="22"/>
  <text class="chipText" x="408" y="1226">조건부 LLM: verification / case / conflict</text>
  <rect class="chip" x="754" y="1198" width="330" height="44" rx="22"/>
  <text class="chipText" x="780" y="1226">심의이력: case_history RAG 후보</text>
  <rect class="chip" x="1106" y="1198" width="360" height="44" rx="22"/>
  <text class="chipText" x="1132" y="1226">과거 사례는 참고 근거, 최신 기준 우선</text>
</svg>
